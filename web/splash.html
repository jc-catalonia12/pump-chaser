<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Starting — MEXC Trading Bot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: linear-gradient(145deg, #0d1117 0%, #161b22 55%, #0f1419 100%);
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      user-select: none;
    }
    .card {
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    .logo {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      margin: 0 auto 16px;
      background: linear-gradient(135deg, #1f6feb, #238636);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.25rem;
      letter-spacing: -0.02em;
    }
    h1 {
      font-size: 1.125rem;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 0.8125rem;
      color: #8b949e;
      margin-bottom: 28px;
    }
    .status {
      font-size: 0.875rem;
      color: #c9d1d9;
      min-height: 1.25rem;
      margin-bottom: 16px;
    }
    .progress-track {
      height: 4px;
      background: #21262d;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .progress-bar {
      height: 100%;
      width: 8%;
      background: linear-gradient(90deg, #1f6feb, #58a6ff);
      border-radius: 999px;
      transition: width 0.35s ease;
    }
    .step-label {
      font-size: 0.75rem;
      color: #6e7681;
    }
    .error {
      display: none;
      margin-top: 16px;
      padding: 12px;
      background: rgba(248, 81, 73, 0.12);
      border: 1px solid rgba(248, 81, 73, 0.35);
      border-radius: 8px;
      font-size: 0.8125rem;
      color: #ffa198;
      text-align: left;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .error.visible { display: block; }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: -2px;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">MX</div>
    <h1>MEXC Trading Bot</h1>
    <p class="subtitle">First launch may take a moment — Ollama (AI layer) will be installed automatically if missing.</p>
    <p class="status" id="status"><span class="spinner"></span>Starting…</p>
    <div class="progress-track">
      <div class="progress-bar" id="progress"></div>
    </div>
    <p class="step-label" id="step-label">Step 1 of 5</p>
    <div class="error" id="error"></div>
  </div>
  <script>
    const STEPS = 5;
    window.setStartupStatus = function (message, step) {
      const status = document.getElementById('status');
      const progress = document.getElementById('progress');
      const stepLabel = document.getElementById('step-label');
      const err = document.getElementById('error');
      err.classList.remove('visible');
      const s = Math.max(1, Math.min(STEPS, step || 1));
      status.innerHTML = '<span class="spinner"></span>' + message;
      progress.style.width = Math.round((s / STEPS) * 100) + '%';
      stepLabel.textContent = 'Step ' + s + ' of ' + STEPS;
    };
    window.setStartupError = function (message) {
      const status = document.getElementById('status');
      const err = document.getElementById('error');
      const progress = document.getElementById('progress');
      status.textContent = 'Startup failed';
      progress.style.width = '100%';
      progress.style.background = '#f85149';
      err.textContent = message;
      err.classList.add('visible');
    };
  </script>
</body>
</html>
