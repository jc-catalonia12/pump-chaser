name: Release

# Triggered when you push a version tag (e.g. v0.2.0).
# Builds signed macOS + Windows installers, generates latest.json for the
# in-app auto-updater, and publishes everything to a GitHub Release.
#
# One-time setup (do this once before your first release):
#   1. cargo tauri signer generate          (generates a key pair)
#   2. Copy the PUBLIC key to tauri.conf.json > plugins.updater.pubkey
#   3. Add the PRIVATE key as GitHub secret: TAURI_SIGNING_PRIVATE_KEY
#   4. Add any key password as:             TAURI_SIGNING_PRIVATE_KEY_PASSWORD
#   5. Set your repo URL in:                TAURI_UPDATE_ENDPOINT secret
#      e.g. https://github.com/OWNER/mexc-trading-bot-rust/releases/latest/download/latest.json
#   6. Set TAURI_UPDATER_PUBKEY secret to the same public key value
#      (so the CI can inject it into tauri.conf.json at build time)
#
# See scripts/setup_signing.sh for a guided setup walkthrough.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.0)"
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  ONNX_PATH: data/models/supervised.onnx

jobs:
  # ─────────────────────────── macOS ────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - name: Get version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME:-${{ inputs.tag }}}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Sync release version into Cargo + Tauri config
        run: |
          TAG="${GITHUB_REF_NAME:-${{ inputs.tag }}}"
          VERSION="${TAG#v}"
          printf '%s\n' "$VERSION" > VERSION
          bash scripts/sync_version.sh
          echo "Building installer as v$(tr -d ' \n\r' < VERSION)"

      - name: Restore ML models
        env:
          SUPERVISED_ONNX_B64: ${{ secrets.SUPERVISED_ONNX_B64 }}
          ONLINE_MODEL_JSON_B64: ${{ secrets.ONLINE_MODEL_JSON_B64 }}
        run: |
          mkdir -p data/models
          if [ -f data/models/production.onnx ] && [ ! -f data/models/supervised.onnx ]; then
            cp data/models/production.onnx data/models/supervised.onnx
          fi
          if [ -f data/models/supervised.onnx ] && [ ! -f data/models/production.onnx ]; then
            cp data/models/supervised.onnx data/models/production.onnx
          fi
          if [ ! -f data/models/production.onnx ] && [ ! -f data/models/supervised.onnx ]; then
            if [ -z "$SUPERVISED_ONNX_B64" ]; then
              echo "::error::Commit data/models/production.onnx (or supervised.onnx) or set SUPERVISED_ONNX_B64 secret"
              exit 1
            fi
            echo "$SUPERVISED_ONNX_B64" | base64 --decode > data/models/production.onnx
            cp data/models/production.onnx data/models/supervised.onnx
          fi
          if [ -n "$ONLINE_MODEL_JSON_B64" ] && [ ! -f data/models/online_model.json ]; then
            echo "$ONLINE_MODEL_JSON_B64" | base64 --decode > data/models/online_model.json
          fi

      - name: Inject updater pubkey + endpoint into tauri.conf.json
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          TAURI_UPDATE_ENDPOINT: ${{ secrets.TAURI_UPDATE_ENDPOINT }}
        run: |
          CONF="desktop/src-tauri/tauri.conf.json"
          # Only inject if secrets are set; otherwise leave placeholder (updater silently skips).
          if [ -n "$TAURI_UPDATER_PUBKEY" ]; then
            python3 -c "
          import json, os, sys
          conf = json.load(open('$CONF'))
          conf.setdefault('plugins', {}).setdefault('updater', {})
          conf['plugins']['updater']['pubkey'] = os.environ['TAURI_UPDATER_PUBKEY']
          if os.environ.get('TAURI_UPDATE_ENDPOINT'):
              conf['plugins']['updater']['endpoints'] = [os.environ['TAURI_UPDATE_ENDPOINT']]
          json.dump(conf, open('$CONF', 'w'), indent=2)
          "
            echo "Injected updater pubkey and endpoint"
          fi

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0.0" --locked

      - name: Stage release assets
        run: bash scripts/prepare_release_assets.sh

      - name: Build macOS installer (x86_64)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        working-directory: desktop/src-tauri
        run: cargo tauri build --target x86_64-apple-darwin

      # Optional: also build for Apple Silicon
      - name: Add aarch64 target
        run: rustup target add aarch64-apple-darwin

      - name: Build macOS installer (aarch64)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        working-directory: desktop/src-tauri
        run: cargo tauri build --target aarch64-apple-darwin

      - name: Collect macOS artifacts
        run: bash scripts/collect_ci_artifacts.sh macos dist/release-macos

      - uses: actions/upload-artifact@v5
        with:
          name: macos-release
          path: dist/release-macos/**
          if-no-files-found: error
          retention-days: 1

  # ─────────────────────────── Windows ──────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Sync release version into Cargo + Tauri config
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME:-${{ inputs.tag }}}"
          VERSION="${TAG#v}"
          printf '%s\n' "$VERSION" > VERSION
          bash scripts/sync_version.sh
          echo "Building installer as v$(tr -d ' \n\r' < VERSION)"

      - name: Restore ML models
        env:
          SUPERVISED_ONNX_B64: ${{ secrets.SUPERVISED_ONNX_B64 }}
          ONLINE_MODEL_JSON_B64: ${{ secrets.ONLINE_MODEL_JSON_B64 }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "data/models" | Out-Null
          if ((Test-Path "data/models/production.onnx") -and -not (Test-Path "data/models/supervised.onnx")) {
            Copy-Item "data/models/production.onnx" "data/models/supervised.onnx" -Force
          }
          if ((Test-Path "data/models/supervised.onnx") -and -not (Test-Path "data/models/production.onnx")) {
            Copy-Item "data/models/supervised.onnx" "data/models/production.onnx" -Force
          }
          if (-not (Test-Path "data/models/production.onnx") -and -not (Test-Path "data/models/supervised.onnx")) {
            if (-not $env:SUPERVISED_ONNX_B64) {
              Write-Error "Commit data/models/production.onnx (or supervised.onnx) or set SUPERVISED_ONNX_B64 secret"
            }
            [IO.File]::WriteAllBytes("data/models/production.onnx", [Convert]::FromBase64String($env:SUPERVISED_ONNX_B64))
            Copy-Item "data/models/production.onnx" "data/models/supervised.onnx" -Force
          }
          if ($env:ONLINE_MODEL_JSON_B64 -and -not (Test-Path "data/models/online_model.json")) {
            [IO.File]::WriteAllBytes("data/models/online_model.json",
              [Convert]::FromBase64String($env:ONLINE_MODEL_JSON_B64))
          }

      - name: Inject updater pubkey + endpoint into tauri.conf.json
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          TAURI_UPDATE_ENDPOINT: ${{ secrets.TAURI_UPDATE_ENDPOINT }}
        shell: pwsh
        run: |
          if ($env:TAURI_UPDATER_PUBKEY) {
            $conf = Get-Content "desktop/src-tauri/tauri.conf.json" | ConvertFrom-Json
            if (-not $conf.plugins) { $conf | Add-Member -MemberType NoteProperty -Name plugins -Value @{} }
            if (-not $conf.plugins.updater) { $conf.plugins | Add-Member -MemberType NoteProperty -Name updater -Value @{} }
            $conf.plugins.updater.pubkey = $env:TAURI_UPDATER_PUBKEY
            if ($env:TAURI_UPDATE_ENDPOINT) {
              $conf.plugins.updater.endpoints = @($env:TAURI_UPDATE_ENDPOINT)
            }
            $conf | ConvertTo-Json -Depth 10 | Set-Content "desktop/src-tauri/tauri.conf.json"
            Write-Host "Injected updater pubkey and endpoint"
          }

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0.0" --locked

      - name: Stage release assets (bash)
        shell: bash
        run: bash scripts/prepare_release_assets.sh

      - name: Build Windows installer
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        working-directory: desktop/src-tauri
        run: cargo tauri build

      - name: Collect Windows artifacts
        shell: bash
        run: bash scripts/collect_ci_artifacts.sh windows dist/release-windows

      - uses: actions/upload-artifact@v5
        with:
          name: windows-release
          path: dist/release-windows/**
          if-no-files-found: error
          retention-days: 1

  # ────────────────────── Publish GitHub Release ────────────────────────────
  publish:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download macOS artifacts
        uses: actions/download-artifact@v5
        with:
          name: macos-release
          path: dist/release-macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v5
        with:
          name: windows-release
          path: dist/release-windows

      - name: Generate latest.json (auto-updater manifest)
        continue-on-error: true
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
          VERSION: ${{ needs.build-macos.outputs.version }}
        run: |
          python3 scripts/gen_update_manifest.py \
            --version "$VERSION" \
            --tag     "$TAG" \
            --repo    "$GITHUB_REPOSITORY" \
            --macos   dist/release-macos \
            --windows dist/release-windows \
            --out     dist/latest.json
          if [ -f dist/latest.json ]; then
            echo "=== latest.json ===" && cat dist/latest.json
          else
            echo "No latest.json (signing artifacts missing) — installers will still be published"
          fi

      - name: Extract release notes
        id: notes
        run: |
          {
            echo 'notes<<ENDNOTES'
            echo "## MEXC Trading Bot v${{ needs.build-macos.outputs.version }}"
            echo ""
            echo "V2 release — historical ML training, TA chart overlays, and SL/TP/trailing-only exits."
            echo ""
            echo "See [UPGRADE-V2.0.0.md](https://github.com/${{ github.repository }}/blob/master/UPGRADE-V2.0.0.md) for the full change log."
            echo ""
            echo "### What's included"
            echo "- Offline historical candle training (\`python -m training\`)"
            echo "- Production ONNX model gating (meta-labeled)"
            echo "- Chart TA overlays (EMA / RSI / MACD) + trade reasons"
            echo "- Positions close only on stop loss, take profit, or trailing stop (no time exit)"
            echo "- In-app auto-update notifications"
            echo ""
            echo "### Installation"
            echo "- **macOS**: download the \`.dmg\` and drag to Applications"
            echo "- **Windows**: download the \`.msi\` or \`*-setup.exe\` and run it (uninstall older builds first if the version banner still shows 0.1.x)"
            echo ""
            echo "No additional prerequisites — all dependencies are bundled."
            echo "Ollama is optional (install separately for the LLM regime layer)."
            echo 'ENDNOTES'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: "MEXC Trading Bot v${{ needs.build-macos.outputs.version }}"
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: false
          files: |
            dist/release-macos/*.dmg
            dist/release-macos/*.app.tar.gz
            dist/release-macos/*.app.tar.gz.sig
            dist/release-windows/*.msi
            dist/release-windows/*.msi.zip
            dist/release-windows/*.msi.zip.sig
            dist/release-windows/*setup*.exe
            dist/latest.json
