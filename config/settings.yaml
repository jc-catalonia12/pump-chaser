mexc:
  rest_base_url: https://contract.mexc.co
  ws_url: wss://contract.mexc.co/edge
  request_timeout_sec: 15.0
  rate_limit_delay_ms: 100
scanner:
  kline_interval: Min1
  kline_lookback_bars: 60
  max_symbols_kline_poll: 150
  min_24h_turnover_usdt: 500000.0
  min_price_usdt: 0.05
  usdt_m_crypto_only: true
  kline_refresh_sec: 60
  htf_interval: Min15
  htf_lookback_bars: 250
  fetch_funding_rate: true
zones:
  enabled: true
  lookback_bars: 50
  pivot_left: 2
  pivot_right: 2
  zone_width_pct: 0.2
  proximity_pct: 0.25
trading:
  mode: ai
  max_hold_sec: 2400
ai:
  min_move_pct: 0.1
  move_lookback_ticks: 6
  signal_cooldown_sec: 120
  atr_sl_mult: 1.5
  tp_r_multiples: [1.5, 2.5, 4.0]
  tp_close_fractions: [0.5, 0.3, 0.2]
  base_leverage: 20
risk:
  max_risk_per_trade: 0.01
  max_leverage: 100
  max_concurrent_positions: 10
  daily_loss_limit: 0.08
  min_position_margin_usdt: 3.0
  use_live_wallet_equity: false
  max_funding_rate_abs: 0.001
  max_atr_pct: 14.0
  default_sl_pct: 0.02
  trailing_stop_pct: 0.01
  trailing_activation_pct: 0.012
  trailing_extended_activation_pct: 0.03
  trailing_extended_stop_pct: 0.014
  trailing_runner_activation_pct: 0.05
  trailing_runner_stop_pct: 0.024
  allow_hedge: false
  max_consecutive_losses: 5
  loss_streak_cooldown_sec: 900
  max_drawdown_halt_pct: 0.2
  symbol_loss_cooldown_sec: 1800
  ws_stale_sec: 45
  min_profit_usdt: 0.5
execution:
  live_trading_enabled: false
  dry_run: true
  sync_exchange_positions: false
  paper_fee_rate: 0.0006
  paper_slippage_pct: 0.0005
  paper_initial_equity: 100.0
  paper_reset_on_start: false
  paper_relax_gates: true
  limit_offset_pct: 0.001
  limit_ttl_sec: 30
storage:
  sqlite_path: data/mexc_trading_bot.db
ml:
  enabled: true
  supervised_enabled: true
  supervised_threshold: 0.60
  min_training_samples: 50
  hard_ml_gate: false
  onnx_model_path: data/models/production.onnx
  trade_win_weight: 2.0
  trade_loss_weight: 3.5
  gate_min_accuracy: 0.6
  gate_disable_accuracy: 0.52
  gate_auto_min_samples: 500
  ml_risk_scale_min: 0.35
  ml_risk_scale_max: 1.0
  kelly_fraction: 0.5
  # V2: train offline from historical candles; do not learn from live outcomes.
  online_learning_enabled: false
  auto_retrain_enabled: false
  retrain_interval_hours: 168
  retrain_min_new_samples: 30
  python_bin: env/bin/python
  export_script_path: scripts/export_onnx.py
  training_module: training
  training_symbols: []
  training_auto_universe: true
  training_top_n: 10
  training_min_turnover_usdt: 500000.0
  training_interval: Min15
  training_days: 180
server:
  host: 127.0.0.1
  port: 8001
learning:
  enabled: false
  shadow_ml_rejects: true
  shadow_ml_reject_weight: 0.75
  shadow_max_per_symbol_hour: 4
  shadow_max_pending: 500
  shadow_near_miss_weight: 0.2
  shadow_sentiment_weight: 0.4
  auto_tune_enabled: true
  auto_tune_apply: suggest
  auto_tune_interval_hours: 6
watchlist:
  mode: all
backtest:
  engine: builtin
exchanges:
  mexc_client: native
alerts:
  enabled: false
  webhook_url: ''
  telegram_chat_id: ''
  min_interval_sec: 300
sentiment:
  enabled: true
  poll_interval_sec: 300
  block_long_below: -0.7
  block_short_above: 0.7
  symbol_block_threshold: 0.65
  decay_half_life_sec: 7200.0
# Local LLM regime layer (Ollama). Never hard-blocks: if Ollama is offline
# the regime stays neutral and the bot trades on ML alone.
llm:
  enabled: true
  base_url: http://localhost:11434
  model: llama3.2
  poll_interval_sec: 300
  timeout_sec: 30
# In-app virtual assistant (Ollama chat + tools).
assistant:
  web_enabled: true
  settings_write_enabled: true
  max_tool_rounds: 4
  max_fetch_bytes: 131072
  max_tool_result_chars: 4000
# Unified decision & sizing authority (Phase 5). Combines ML win prob,
# expected value, LLM regime alignment, and sentiment into go/no-go + size.
# With a neutral regime this is a pure EV / reward-risk gate on the ML edge.
decision:
  enabled: true
  min_expected_value: 0.0
  min_reward_risk: 0.8
  regime_veto_confidence: 0.6
  regime_veto_alignment: 0.5
  regime_size_boost: 0.25
  high_vol_size_haircut: 0.25
  sentiment_size_weight: 0.15
  min_size_scale: 0.4
  max_size_scale: 1.5
